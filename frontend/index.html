<!-- index.html — SPA TravelHub : conteneur pour la carte, le drawer, les modales et l'auth. -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelHub</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">🌍 TravelHub</div>
    <nav id="nav">
      <a href="#map">Carte</a>
      <a href="#presence" data-role="contributeur" hidden>Je suis là</a>
      <a href="#admin" data-role="admin" hidden>Admin</a>
      <span id="user-info"></span>
      <a href="#login" id="login-link">Connexion</a>
      <a href="#" id="logout-link" hidden>Déconnexion</a>
    </nav>
  </header>

  <main id="app">
    <!-- Vue carte -->
    <section id="view-map" class="view">
      <div id="map"></div>
      <aside id="drawer" class="drawer">
        <button id="drawer-toggle" aria-label="Basculer le panneau">☰</button>
        <div class="drawer-content">
          <h2>Spots</h2>
          <div class="filters">
            <input id="filter-country" placeholder="Pays" />
            <input id="filter-city" placeholder="Ville" />
            <select id="filter-category">
              <option value="">Toutes catégories</option>
              <option value="restaurant">Restaurant</option>
              <option value="hotel">Hôtel</option>
              <option value="activite">Activité</option>
              <option value="transport">Transport</option>
              <option value="info_locale">Info locale</option>
              <option value="danger">Danger</option>
              <option value="astuce">Astuce</option>
            </select>
            <button id="filter-apply">Filtrer</button>
          </div>
          <button id="btn-new-spot" data-role="contributeur" hidden>+ Nouveau spot</button>
          <ul id="spot-list"></ul>
        </div>
      </aside>
    </section>

    <!-- Vue login/register -->
    <section id="view-auth" class="view" hidden>
      <div class="auth-box">
        <h2 id="auth-title">Connexion</h2>
        <form id="auth-form">
          <input type="text" id="auth-username" placeholder="Nom d'utilisateur" hidden />
          <input type="email" id="auth-email" placeholder="Email" required />
          <input type="password" id="auth-password" placeholder="Mot de passe" required />
          <button type="submit" id="auth-submit">Se connecter</button>
          <p id="auth-toggle"><a href="#register">Créer un compte</a></p>
          <p id="auth-error" class="error"></p>
        </form>
      </div>
    </section>

    <!-- Vue admin -->
    <section id="view-admin" class="view" hidden>
      <h2>Administration</h2>
      <table id="users-table">
        <thead><tr><th>ID</th><th>Email</th><th>Username</th><th>Rôle</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Vue détail spot -->
    <section id="view-spot" class="view" hidden>
      <button onclick="location.hash='#map'">← Retour</button>
      <div id="spot-detail"></div>
    </section>
  </main>

  <!-- Modale création spot / présence -->
  <div id="modal" class="modal" hidden>
    <div class="modal-content">
      <button id="modal-close" class="close">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/map.js"></script>
  <script src="js/spots.js"></script>
  <script src="js/votes.js"></script>
  <script src="js/presences.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
